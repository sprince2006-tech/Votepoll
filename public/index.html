<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tamil Nadu Vote Poll 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --saffron: #e8821a; --saffron2: #f4a44a; --green: #1a5c38;
            --white: #fff; --ink: #0f0f0f; --muted: #6b6b6b;
            --paper: #faf8f5; --border: rgba(0,0,0,0.08); --red: #d63031;
        }
        html, body { height: 100%; font-family: 'Outfit', sans-serif; background: var(--ink); overflow: hidden; }
        #app { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        .page { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transform: translateY(40px); transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16,1,0.3,1); }
        .page.active { opacity: 1; pointer-events: all; transform: translateY(0); }

        /* PAGE 1 */
        #page1 { background: var(--ink); flex-direction: column; }
        .grid-bg { position: absolute; inset: 0; background-image: linear-gradient(rgba(232,130,26,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(232,130,26,0.06) 1px, transparent 1px); background-size: 60px 60px; animation: gridMove 20s linear infinite; }
        @keyframes gridMove { from{background-position:0 0} to{background-position:60px 60px} }
        .glow-orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; }
        .orb1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(232,130,26,0.25) 0%, transparent 70%); top: -100px; right: -100px; animation: orbFloat 8s ease-in-out infinite; }
        .orb2 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(26,92,56,0.2) 0%, transparent 70%); bottom: -80px; left: -80px; animation: orbFloat 10s ease-in-out infinite reverse; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-20px)} }
        .p1-inner { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; text-align: center; padding: 40px 32px; max-width: 420px; width: 100%; }
        .flag-strip { display: flex; gap: 4px; margin-bottom: 32px; animation: slideDown 0.6s cubic-bezier(0.16,1,0.3,1) 0.1s both; }
        .flag-bar { height: 5px; border-radius: 3px; }
        .fb1 { width: 60px; background: var(--saffron); }
        .fb2 { width: 60px; background: #fff; }
        .fb3 { width: 60px; background: var(--green); }
        @keyframes slideDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
        .p1-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--saffron); margin-bottom: 18px; animation: slideDown 0.6s cubic-bezier(0.16,1,0.3,1) 0.2s both; }
        .p1-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(44px,10vw,64px); font-weight: 700; color: var(--white); line-height: 1.05; letter-spacing: -0.02em; margin-bottom: 16px; animation: slideDown 0.6s cubic-bezier(0.16,1,0.3,1) 0.3s both; }
        .p1-title span { color: var(--saffron); font-style: italic; }
        .p1-sub { font-size: 15px; color: rgba(255,255,255,0.5); font-weight: 300; line-height: 1.6; max-width: 320px; margin-bottom: 48px; animation: slideDown 0.6s cubic-bezier(0.16,1,0.3,1) 0.4s both; }
        .p1-btn { position: relative; display: inline-flex; align-items: center; gap: 12px; padding: 18px 40px; background: var(--saffron); color: var(--white); font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600; border: none; border-radius: 2px; cursor: pointer; letter-spacing: 0.04em; transition: all 0.2s; animation: slideDown 0.6s cubic-bezier(0.16,1,0.3,1) 0.5s both; overflow: hidden; }
        .p1-btn::before { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0.15); transform: translateX(-100%); transition: transform 0.3s ease; }
        .p1-btn:hover::before { transform: translateX(0); }
        .p1-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(232,130,26,0.4); }
        .p1-btn-arrow { width: 22px; height: 22px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .p1-stats { display: flex; gap: 32px; margin-top: 48px; animation: slideDown 0.6s cubic-bezier(0.16,1,0.3,1) 0.6s both; }
        .stat { text-align: center; }
        .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: var(--white); }
        .stat-label { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
        .stat-divider { width: 1px; background: rgba(255,255,255,0.1); align-self: stretch; }

        /* PAGE 2 */
        #page2 { background: var(--paper); padding: 20px; overflow-y: auto; }
        .card { width: 100%; max-width: 420px; background: var(--white); border-radius: 3px; box-shadow: 0 4px 6px rgba(0,0,0,0.04), 0 24px 64px rgba(0,0,0,0.12); overflow: hidden; }
        .progress-bar { height: 3px; background: #eee; }
        .progress-fill { height: 100%; background: linear-gradient(to right, var(--saffron), var(--saffron2)); }
        .card-top { padding: 28px 32px 24px; border-bottom: 1px solid var(--border); }
        .step-label { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--saffron); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .step-label::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--saffron); animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
        .card-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; color: var(--ink); line-height: 1.2; }
        .card-sub { margin-top: 6px; font-size: 13px; color: var(--muted); font-weight: 300; }
        .card-body { padding: 28px 32px 32px; }
        .back-btn { background: none; border: none; font-family: 'Outfit', sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 6px; margin-bottom: 20px; padding: 0; }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
        .field input { width: 100%; padding: 13px 16px; font-family: 'Outfit', sans-serif; font-size: 15px; color: var(--ink); background: var(--paper); border: 1.5px solid transparent; border-radius: 2px; outline: none; transition: border-color 0.2s; }
        .field input:focus { border-color: var(--saffron); background: #fff; }
        .field input::placeholder { color: #c0b8b0; }
        .or-row { display: flex; align-items: center; gap: 12px; margin: 20px 0; font-size: 12px; color: #ccc; }
        .or-row::before, .or-row::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .google-btn { width: 100%; padding: 13px 20px; display: flex; align-items: center; justify-content: center; gap: 12px; background: #fff; border: 1.5px solid #e0ddd8; border-radius: 2px; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 500; color: var(--ink); cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .google-btn:hover { border-color: #bbb; box-shadow: 0 3px 10px rgba(0,0,0,0.08); transform: translateY(-1px); }
        .google-logo { width: 20px; height: 20px; flex-shrink: 0; }
        .btn { width: 100%; padding: 15px; margin-top: 10px; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; color: #fff; background: var(--ink); border: none; border-radius: 2px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:hover { background: #222; transform: translateY(-1px); }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)} }
    </style>
</head>
<body>
<div id="app">

    <!-- PAGE 1: GET STARTED -->
    <div class="page active" id="page1">
        <div class="grid-bg"></div>
        <div class="glow-orb orb1"></div>
        <div class="glow-orb orb2"></div>
        <div class="p1-inner">
            <div class="flag-strip">
                <div class="flag-bar fb1"></div>
                <div class="flag-bar fb2"></div>
                <div class="flag-bar fb3"></div>
            </div>
            <div class="p1-eyebrow">Tamil Nadu · 2026 Election Poll</div>
            <h1 class="p1-title">Your<br><span>Vote</span><br>Matters.</h1>
            <p class="p1-sub">Participate in the Tamil Nadu Vote Poll 2026. Secure, private, and takes less than a minute.</p>
            <button class="p1-btn" onclick="goToPage(2)">
                Get Started
                <div class="p1-btn-arrow">→</div>
            </button>
            <div class="p1-stats">
                <div class="stat"><div class="stat-num">4</div><div class="stat-label">Parties</div></div>
                <div class="stat-divider"></div>
                <div class="stat"><div class="stat-num">18+</div><div class="stat-label">Age Required</div></div>
                <div class="stat-divider"></div>
                <div class="stat"><div class="stat-num">1</div><div class="stat-label">Vote Each</div></div>
            </div>
        </div>
    </div>

    <!-- PAGE 2: NAME & EMAIL / GOOGLE -->
    <div class="page" id="page2">
        <div class="card">
            <div class="progress-bar"><div class="progress-fill" style="width:50%"></div></div>
            <div class="card-top">
                <div class="step-label">Step 1 of 2</div>
                <div class="card-title">Who are you?</div>
                <div class="card-sub">Enter your details or sign in with Google.</div>
            </div>
            <div class="card-body">
                <button class="back-btn" onclick="goToPage(1)">← Back</button>
                <div class="field">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name">
                </div>
                <div class="field">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>
                <button class="btn" onclick="manualNext()">Continue →</button>
                <div class="or-row">or</div>
                <!-- Google button → goes directly to Google OAuth (age check happens after login) -->
                <a href="/auth/google" class="google-btn">
                    <svg class="google-logo" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Sign in with Google
                </a>
            </div>
        </div>
    </div>

</div>

<script>
    function goToPage(n) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + n).classList.add('active');
    }

    function manualNext() {
        const name  = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        if (!name) { shake('name'); }
        if (!email || !email.includes('@')) { shake('email'); }
        if (!name || !email || !email.includes('@')) return;
        // Manual path → also go to Google OAuth (server will redirect to /verify-age)
        window.location.href = '/auth/google';
    }

    function shake(id) {
        const el = document.getElementById(id);
        el.style.borderColor = '#d63031';
        el.style.animation = 'none';
        void el.offsetWidth;
        el.style.animation = 'shake 0.4s ease';
        setTimeout(() => { el.style.borderColor = ''; el.style.animation = ''; }, 500);
    }
</script>
</body>
</html>
